<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM</title>
</head>
<body>
    <h3>Registration Form</h3>
    <form action="/action.php">
        <input type="text" placeholder="Username...">
        <br><br>
        <input type="password" placeholder="password...">
        <br>

        <h4>Select your class</h4>

        <label for="101">
            <input type="radio" value="class XI" name="class" id="101">class XI
        </label>
        <br><br>
        <label for="102">
            <input type="radio" value="class XII" name="class" id="102">class XII
        </label>

        <br><br>
        <h4>Select for subjects</h4>
         
        <label for="math">
            <input type="checkbox" value="math" name="subject" id="101">Math
        </label>
        <br>
        <label for="phy">
            <input type="checkbox" value="phy" name="subject" id="101">Physics
        </label>
        <br>
        <label for="chem">
            <input type="checkbox" value="chem" name="subject" id="101">Chemistry
        </label>
        <br>
        <label for="CS">
            <input type="checkbox" value="CS" name="subject" id="101">CS
        </label>
        <br><br>
        Select Your City  
        <select name="city">
            <option value="Delhi">Delhi</option>
            <option value="Mumbai">Mumbai</option>
            <option value="Bangalore">Bangalore</option>
            <option value="Jaipur">Jaipur</option>
        </select>
        <br><br>

        <textarea name="feedback" id="101" placeholder="Please give your valuable feedback here" rows="5"></textarea>

        <br>

        <input type="submit" value="submit">
    </form>
    
    <footer></footer>
</body>
</html>
