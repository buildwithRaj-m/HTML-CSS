<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Objects</title>
</head>
<body>
  <script>
    const product = {
      name: 'socks',
      price: 1090
    };
    console.log(typeof  product);
    console.log(product.name);
    console.log(product.price);

    product.name = 'cotton socks';
    console.log(product);

    product.newProperty = true ;
    console.log(product);

    delete product.newProperty;
    console.log(product);

    const product2 = {
      name: 'shirt',
      'delivery-time': '1 day',
      rating: {
        stars: 4.5,
        count: 89
      },
      fun: function function1(){
        console.log('Function inside object');
      }
    };
    console.log(product2);
    console.log(product2.rating.stars);  //Dot notation
    console.log(product2['name']);   //Square brackets notation
    console.log(product2['delivery-time']);

    product2.fun();

    console.log(typeof console.log);

    console.log(JSON.stringify(product2));  //Typeof is String 

    const jasonString = JSON.stringify(product2);
    console.log(JSON.parse(jasonString));
  </script>
  
</body>
</html>
