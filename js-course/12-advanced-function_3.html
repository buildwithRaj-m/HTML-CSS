<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Function</title>
</head>
<body>
  <script>
    [
      'make dinner',
      'wash dishes',
      'watch youtube'
    ].forEach(function (value, index) {
      if(value === 'wash dishes') {
        return;
      }
      console.log(index);
      console.log(value);
    });
  </script>
  
</body>
