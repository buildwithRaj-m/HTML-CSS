<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arrays and Loops</title>
</head>
<body>
  <script>
    const myArray = [10, 20, 30];
    console.log(myArray);
    console.log(myArray[2]);

    myArray[0] = 99;
    console.log(myArray);

    const array2 = [1, 'hello', true, {name: 'socks'}, [2, 1]];
    console.log(array2.length);
    console.log(typeof array2);
    console.log(Array.isArray([1, 2]));

    myArray.push(100);
    console.log(myArray);

    myArray.splice(0, 1);
    console.log(myArray);

    // Loops - 1) While Loop
    let i = 1;
    while (i <= 5) {
      console.log(i);
      i++;
    }

    let randomNumber = 0;

    while(randomNumber < 0.5) {
      randomNumber = Math.random();
    }
    console.log(randomNumber);

    // Looping Through an Array

    const todoList = [
      'make dinner',
      'wash dishes',
      'watch youtube'
    ];

    for(let i = 0; i < todoList.length; i++) {
      const value = todoList[i];
      console.log(value);
    }

    //Accumulator Pattern
    const nums = [1, 2, 5];
    let total = 0;   //Accumulator Variable

    for(let i = 0; i < nums.length; i++) {
      const num = nums[i];
      total += num;
    }
    console.log(total);

    const array1 = [1, 2, 3];
    const array3 = array1.slice();
    array3.push(4);
    console.log(array1);
    console.log(array3);

    const [firstValue, secondValue] = [1, 2, 3];

    //for loop
    for(let i = 1; i <= 10; i++) {
      if(i % 3 === 0) {
        continue;    //Skip 1 iteration
      }
      console.log(i);
      if (i === 8) {
        break;  // exit a loop early
      }
    }

    let n = 1;

    while(n <= 10) {
      if(n % 3 === 0) {
        n++;      // Keep in mind 
        continue;
      }
      console.log(n);
      n++;
    }
 
    function doubleArray(number) {
    const numsDoubled = [];

    for(let i = 0; i< number.length; i++) {
      const num = number[i];
      if(num === 0) {
       return numsDoubled;
      }
      numsDoubled.push(num * 2);
    }
    return numsDoubled;
    }
    console.log(doubleArray([1, 5, 7]));
    console.log(doubleArray([2, 4, 9, 5, 0]));
  </script>
</body>
</html>
